// 设备检测函数（iOS版本）
function checkiOSVersion() {
    const ua = navigator.userAgent;
    if (/iPhone|iPad|iPod/.test(ua) && /OS (\d+)_(\d+)/.test(ua)) {
        const major = parseInt(RegExp.$1, 10);
        const minor = parseInt(RegExp.$2, 10);
        return (major === 12 && minor >= 0 && minor <= 5);
    }
    return false;
}
