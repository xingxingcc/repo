<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>maximum jailbreak</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
width:100vw;
height:100vh;
background: linear-gradient(-45deg,#050812,#0b1529,#101c38,#061020,#091426);
background-size:400% 400%;
animation: gradientFlow 12s ease infinite;
color:#fff;
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",Segoe UI,Roboto,Light,sans-serif;
text-align:center;
padding-top:140px;
overflow:hidden;
font-weight:300;
letter-spacing:1px;
}
@keyframes gradientFlow{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}
.title-container{
margin-bottom:40px;
}
h1{
font-size:42px;
color:#ffffff;
letter-spacing:8px;
font-weight:200;
line-height:1.2;
text-shadow: 0 0 15px rgba(255,255,255,0.2);
}
.subtitle{
font-size:14px;
color:rgba(255,255,255,0.55);
margin-top:10px;
letter-spacing:2px;
}
.btn{
padding:20px 50px;
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.2);
border-radius:999px;
color:#fff;
font-size:17px;
backdrop-filter:blur(8px);
font-weight:300;
letter-spacing:2px;
outline:none;
border:none;
transition: all 0.2s ease;
cursor: pointer;
}
.btn:active{
transform: scale(0.96);
background:rgba(255,255,255,0.15);
box-shadow: 0 0 20px rgba(255,255,255,0.15);
}
.author{
position:fixed;
bottom:35px;
left:0;
width:100%;
font-size:13px;
color:rgba(255,255,255,0.5);
letter-spacing:1px;
font-weight:200;
line-height:1.8;
background: linear-gradient(to top, rgba(0,0,0,0.3), transparent);
padding:20px 0;
}
/* 加载动画层 */
.loading-overlay {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 999;
}
.spinner {
  width: 50px;
  height: 50px;
  border: 3px solid rgba(255,255,255,0.2);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin-bottom: 15px;
}
@keyframes spin {
  to { transform: rotate(360deg); }
}
.progress-text {
  color:#fff;
  font-size:16px;
  margin-top:10px;
}
</style>
</head>
<body>

<div class="title-container">
    <h1>maximum<br>jailbreak</h1>
    <div class="subtitle">（支持iOS12.0～iOS12.5.7在线越狱）</div>
</div>

<button class="btn" id="jbBtn" onclick="startJB()">一键越狱</button>

<div class="author">
由github 作者star shining制作<br>
来自中国🇨🇳<br>
制作者QQ：3783348120
</div>

<!-- 加载动画层 -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <p class="progress-text" id="progressText">正在准备越狱流程... 1/3</p>
</div>

<script>
function startJB(){
    const overlay = document.getElementById('loadingOverlay');
    const progressText = document.getElementById('progressText');
    overlay.style.display = 'flex';

    // 分三步模拟进度
    setTimeout(() => {
        progressText.textContent = "正在注入漏洞... 2/3";
    }, 1000);

    setTimeout(() => {
        progressText.textContent = "正在安装组件... 3/3";
    }, 2000);

    setTimeout(() => {
        overlay.style.display = 'none';
        alert("正在制作中，敬请期待！");
    }, 3000);
}
</script>
</body>
</html>
