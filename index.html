<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>maximum jailbreak</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
width:100vw;
height:100vh;
background: linear-gradient(-45deg,#050812,#0b1529,#101c38,#061020,#091426);
background-size:400% 400%;
animation: gradientFlow 12s ease infinite;
color:#fff;
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",Segoe UI,Roboto,Light,sans-serif;
text-align:center;
padding-top:140px;
overflow:hidden;
font-weight:300;
letter-spacing:1px;
}
@keyframes gradientFlow{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}
.title-container{
margin-bottom:40px;
}
h1{
font-size:42px;
color:#ffffff;
letter-spacing:8px;
font-weight:200;
line-height:1.2;
text-shadow: 0 0 15px rgba(255,255,255,0.2);
}
.subtitle{
font-size:14px;
color:rgba(255,255,255,0.55);
margin-top:10px;
letter-spacing:2px;
}
.btn{
padding:20px 50px;
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.2);
border-radius:999px;
color:#fff;
font-size:17px;
backdrop-filter: blur(8px);
font-weight:300;
letter-spacing:2px;
outline:none;
border:none;
transition: all 0.2s ease;
cursor: pointer;
}
.btn:active{
transform: scale(0.96);
background:rgba(255,255,255,0.15);
box-shadow: 0 0 20px rgba(255,255,255,0.15);
}
.author{
position:fixed;
bottom:35px;
left:0;
width:100%;
font-size:13px;
color:rgba(255,255,255,0.5);
letter-spacing:1px;
font-weight:200;
line-height:1.8;
background: linear-gradient(to top, rgba(0,0,0,0.3), transparent);
padding:20px 0;
}
.loading-overlay {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 999;
}
.spinner {
  width: 50px;
  height: 50px;
  border: 3px solid rgba(255,255,255,0.2);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin-bottom: 15px;
}
@keyframes spin {
  to { transform: rotate(360deg); }
}
.progress-text {
  color:#fff;
  font-size:16px;
  margin-top:10px;
}
</style>
</head>
<body>

<div class="title-container">
    <h1>maximum<br>jailbreak</h1>
    <div class="subtitle" id="statusText">（支持iOS12.0～iOS12.5.7在线越狱）</div>
</div>

<button class="btn" onclick="startJailbreak()">一键越狱</button>

<div class="author">
由github 作者star shining制作<br>
来自中国🇨🇳<br>制作者QQ：3783348120
</div>

<div class="loading-overlay" id="loadBox">
  <div class="spinner"></div>
  <p class="progress-text" id="txt"></p>
</div>

<script>
function checkiOSVersion() {
    const ua = navigator.userAgent;
    if (/iPhone|iPad|iPod/.test(ua) && /OS (\d+)_(\d+)/.test(ua)) {
        const major = parseInt(RegExp.$1, 10);
        const minor = parseInt(RegExp.$2, 10);
        return (major === 12 && minor >= 0 && minor <= 5);
    }
    return false;
}

function startJailbreak(){
let box = document.getElementById("loadBox");
let txt = document.getElementById("txt");
let statusText = document.getElementById("statusText");
box.style.display = "flex";

// 1/3 环境检测与漏洞注入
setTimeout(()=>{
    if (!checkiOSVersion()) {
        box.style.display = "none";
        alert("设备不支持！仅支持 iOS 12.0-12.5.7");
        return;
    }
    txt.innerText = "正在执行漏洞注入 1/3";
}, 800);

// 2/3 获取内核权限，挂载分区
setTimeout(()=>{
    txt.innerText = "正在获取系统权限 2/3";
}, 1600);

// 3/3 写入越狱文件（未来这里会写入Cydia和依赖）
setTimeout(()=>{
    txt.innerText = "正在写入越狱组件 3/3";
}, 2400);

// 流程结束，提示重启
setTimeout(()=>{
    box.style.display = "none";
    statusText.innerText = "流程已完成";
    alert("已走完越狱流程，Cydia应该已在您的桌面，但是请不要退出浏览器，我们需要重启SpringBoard。");
}, 3600);
}
</script>
